<!DOCTYPE html>
<html lang="en">
<head>
    
<link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/viralbalaji/IMAGE/0bacadec36fd0446edccaeb507714a634a136814/WWRRR%20RUBY.svg">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Website Shortcuts</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
            background-color: white;
            color: white;
        }
        .header {
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .header img {
            width: 326px;
            margin-left: -18px;
        }       
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        .shortcut {
            padding: 10px 20px;
            font-size: 23px;
            font-weight: bold;
            text-decoration: none;
            font-family: TimesNewRoman;
            color: black;
            background: rgba(0.4, 0.3, 0.2, 0.1); /* More transparency */
            backdrop-filter: blur(10px);
            border-radius: 10px;
            width: 80%;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease-in-out;
        }
        .shortcut:hover {
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.7);
        }
        .shortcut:active {
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.9);
            transform: translateY(2px);
        }

    </style>

             </head>

                     <body>


    <header class="header">
      <img src="RUBY rrrbb RMC.svg" alt="Header Image">


    <h1>Website Shortcuts</h1>
    <div class="container">
        
        
      <a class="shortcut" id="btn-costing" href="COSTING__HANDLER.html" ondblclick="return false;">COSTING</a>
      <a class="shortcut" id="btn-material" href="MATERIAL_TIME- ESIMATER.html" ondblclick="return false;">MATERIAL--MANAGE</a>

      <!-- PRESET EDITOR DIALOG -->
      <dialog id="presetDialog" style="border-radius:12px;padding:24px;min-width:320px;font-family:Arial;background:#fff;border:2px solid #ccc;">
        <h2 id="dlgTitle" style="margin-top:0;font-size:18px;"></h2>
        <div id="dlgFields" style="display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;"></div>
        <div style="margin-top:16px;display:flex;gap:10px;justify-content:flex-end;">
          <button onclick="document.getElementById('presetDialog').close()" style="padding:8px 18px;border-radius:8px;border:1px solid #aaa;cursor:pointer;">Cancel</button>
          <button onclick="savePresets()" style="padding:8px 18px;border-radius:8px;background:#333;color:#fff;border:none;cursor:pointer;font-weight:bold;">Save</button>
        </div>
      </dialog>
    </div>
      <script>
        // ── Storage keys ──
        const STORE_COSTING  = 'presets_costing';
        const STORE_MATERIAL = 'presets_material';

        // ── Default presets (mirrors each HTML's dataPresets) ──
        const DEFAULT_COSTING = {
          "125 ml":      { val1: 40, val2: 45.60,  val3: 10     },
          "150 ml":      { val1: 40, val2: 45.60,  val3: 10.40  },
          "250 ml":      { val1: 40, val2: 23,     val3: 12     },
          "250 ml FLAT": { val1: 40, val2: 23,     val3: 12     },
          "300 ml":      { val1: 40, val2: 27.40,  val3: 16.60  },
          "400 ml":      { val1: 40, val2: 14.60,  val3: 18.40  },
          "500 ml":      { val1: 40, val2: 11.90,  val3: 18.90  },
          "500 ml TALL": { val1: 40, val2: 11.90,  val3: 18.90  },
          "600 ml":      { val1: 40, val2: 26.80,  val3: 22.90  },
          "750 ml":      { val1: 40, val2: 20.10,  val3: 24.84  },
          "1000 ml":     { val1: 40, val2: 21.70,  val3: 28.70  }
        };
        const DEFAULT_MATERIAL = {
          "125 ml":      10,
          "150 ml":      10.40,
          "250 ml":      12,
          "250 ml FLAT": 12,
          "300 ml":      16.60,
          "400 ml":      18.40,
          "500 ml":      18.90,
          "500 ml TALL": 18.90,
          "600 ml":      22.90,
          "750 ml":      24.84,
          "1000 ml":     28.70
        };

        // ── Load from localStorage (APK persists this) ──
        function loadPresets(key, def) {
          try { return JSON.parse(localStorage.getItem(key)) || def; }
          catch(e) { return def; }
        }

        // ── Hold-2s logic ──
        let holdTimer = null, currentTarget = null;

        function startHold(e) {
          currentTarget = e.currentTarget.id;
          holdTimer = setTimeout(() => {
            e.preventDefault();
            openDialog(currentTarget);
            holdTimer = null;
          }, 2000);
        }
        function cancelHold() {
          if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
        }

        ['btn-costing','btn-material'].forEach(id => {
          const el = document.getElementById(id);
          el.addEventListener('mousedown',  startHold);
          el.addEventListener('touchstart', startHold, { passive: true });
          el.addEventListener('mouseup',    cancelHold);
          el.addEventListener('touchend',   cancelHold);
          el.addEventListener('mouseleave', cancelHold);
          // Block navigation if hold was detected
          el.addEventListener('click', e => { if (holdTimer === null && currentTarget === id) { /* let it go */ } });
        });

        // ── Open dialog for the right store ──
        let activeStore = null, activeIsCosting = false;

        function openDialog(btnId) {
          activeIsCosting = (btnId === 'btn-costing');
          activeStore     = activeIsCosting ? STORE_COSTING : STORE_MATERIAL;
          const presets   = loadPresets(activeStore, activeIsCosting ? DEFAULT_COSTING : DEFAULT_MATERIAL);

          document.getElementById('dlgTitle').textContent =
            activeIsCosting ? 'Edit COSTING Values' : 'Edit MATERIAL--MANAGE DATA';

          const container = document.getElementById('dlgFields');
          container.innerHTML = '';

          Object.entries(presets).forEach(([label, val]) => {
            const row = document.createElement('div');
            row.style.cssText = 'display:flex;align-items:center;gap:8px;';

            if (activeIsCosting) {
              row.innerHTML = `
                <span style="width:90px;font-weight:bold;font-size:13px;">${label}</span>
                <input data-key="${label}" data-field="val1" type="number" value="${val.val1}"
                  placeholder="val1" style="width:60px;padding:4px;border-radius:6px;border:1px solid #ccc;">
                <input data-key="${label}" data-field="val2" type="number" value="${val.val2}"
                  placeholder="val2" style="width:70px;padding:4px;border-radius:6px;border:1px solid #ccc;">
                <input data-key="${label}" data-field="val3" type="number" value="${val.val3}"
                  placeholder="val3" style="width:70px;padding:4px;border-radius:6px;border:1px solid #ccc;">`;
            } else {
              row.innerHTML = `
                <span style="width:90px;font-weight:bold;font-size:13px;">${label}</span>
                <input data-key="${label}" type="number" value="${val}"
                  placeholder="weight" style="width:90px;padding:4px;border-radius:6px;border:1px solid #ccc;">`;
            }
            container.appendChild(row);
          });

          document.getElementById('presetDialog').showModal();
        }

        function savePresets() {
          const presets = loadPresets(activeStore, activeIsCosting ? DEFAULT_COSTING : DEFAULT_MATERIAL);
          const inputs  = document.querySelectorAll('#dlgFields input');

          if (activeIsCosting) {
            inputs.forEach(inp => {
              const k = inp.dataset.key, f = inp.dataset.field;
              if (presets[k]) presets[k][f] = parseFloat(inp.value) || 0;
            });
          } else {
            inputs.forEach(inp => {
              const k = inp.dataset.key;
              if (k in presets) presets[k] = parseFloat(inp.value) || 0;
            });
          }

          localStorage.setItem(activeStore, JSON.stringify(presets));
          document.getElementById('presetDialog').close();
          alert('Saved! Values will load next time you open that page.');
        }


      </script>
         </body>

             </html>
